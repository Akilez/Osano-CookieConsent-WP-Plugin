name: Build Release Zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build plugin zip
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_ROOT="$RUNNER_TEMP/package"
          PLUGIN_DIR="$PACKAGE_ROOT/cookie-consent-by-osano"
          ZIP_PATH="$GITHUB_WORKSPACE/cookie-consent-by-osano.zip"

          rm -rf "$PACKAGE_ROOT" "$ZIP_PATH"
          mkdir -p "$PLUGIN_DIR"

          rsync -av ./ "$PLUGIN_DIR" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude 'dist/' \
            --exclude 'tests/' \
            --exclude 'vendor-temp/' \
            --exclude 'plugin-update-checker-src.zip' \
            --exclude 'plugin-update-checker-README.md' \
            --exclude 'AGENTS.md'

          cd "$PACKAGE_ROOT"
          zip -r "$ZIP_PATH" 'cookie-consent-by-osano'

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cookie-consent-by-osano.zip
          fail_on_unmatched_files: true
